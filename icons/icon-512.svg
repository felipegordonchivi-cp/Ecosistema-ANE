<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#041616"/>
  <rect x="18" y="18" width="476" height="476" rx="84" fill="#0a2424"/>

  <!-- ANE brandmark symbol — scaled to fit 512x512 canvas -->
  <!-- Original viewBox 0 0 32 28, scaled ~10x and centered: 
       scale=12, symbol w=32*12=384, h=28*12=336
       offset x=(512-384)/2=64, y=(512-336)/2=88 -->
  <g transform="translate(64, 88) scale(12)">
    <!-- 6 circles -->
    <circle cx="4" cy="4" r="4" fill="#0d9488"/>
    <circle cx="28" cy="4" r="4" fill="#0d9488"/>
    <circle cx="4" cy="14" r="4" fill="#0d9488"/>
    <circle cx="28" cy="14" r="4" fill="#0d9488"/>
    <circle cx="4" cy="24" r="4" fill="#0d9488"/>
    <circle cx="28" cy="24" r="4" fill="#0d9488"/>
    <!-- 3 horizontal lines -->
    <line x1="8" y1="4" x2="24" y2="4" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="14" x2="24" y2="14" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="24" x2="24" y2="24" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 4 vertical connectors -->
    <line x1="4" y1="8" x2="4" y2="10" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="8" x2="28" y2="10" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="18" x2="4" y2="20" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="28" y2="20" stroke="#7dd3d3" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>